<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Image Modal with Zoom</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    #modalImageslider {
      cursor: zoom-in;
      transition: 0.3s;
      max-width: 100%;
    }
  </style>
</head>

<body>

<div class="container mt-5">

  <!-- Link -->
  <ul>
    <li>
      <a href="/wp-content/uploads/2023/03/Attendance-Certificate-28_06_2021-to-30_06_2021-Class-VI-Regular-Lesson-Plan.jpeg-217x300.jpeg"
         class="open-image">
         Class VI Regular Lesson Plan
      </a>
    </li>
  </ul>

</div>

<!-- Modal -->
<div class="modal fade text-center" id="imageModalCarousel" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered modal-lg">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Cares</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body text-center">
        <img id="modalImageslider" src="" class="img-fluid">
      </div>

    </div>
  </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
document.addEventListener("DOMContentLoaded", function () {

  const links = document.querySelectorAll(".open-image");
  const modalImg = document.getElementById("modalImageslider");

  // Open modal
  links.forEach(link => {
    link.addEventListener("click", function (e) {
      e.preventDefault();

      const imgSrc = this.getAttribute("href");
      modalImg.src = imgSrc;

      const modal = new bootstrap.Modal(document.getElementById('imageModalCarousel'));
      modal.show();
    });
  });

  // Zoom functionality
  let zoomed = false;

  modalImg.addEventListener("click", function () {
    if (!zoomed) {
      this.style.transform = "scale(2)";
      this.style.cursor = "zoom-out";
    } else {
      this.style.transform = "scale(1)";
      this.style.cursor = "zoom-in";
    }
    zoomed = !zoomed;
  });

});
</script>

</body>
</html>
