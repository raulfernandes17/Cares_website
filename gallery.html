<html lang="en">
<head>
  <meta charset="UTF-8">

  <style>
  .masonry-img-gallery {
            column-count: 4;
            column-gap: 16px;
            max-width: 1000px;
            /* Optional: control width */
            margin: 0 auto;
            /* Center the whole block */
        }

        .masonry-item-post {
            break-inside: avoid;
            margin-bottom: 16px;
            cursor: pointer;
        }

        .masonry-item-post img {
            width: 100%;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        @media (max-width: 768px) {
            .masonry-img-gallery {
                column-count: 2;
            }
        }

        @media (max-width: 576px) {
            .masonry-img-gallery {
                column-count: 1;
            }
        }

        .owl-carousel img {
            width: 100%;
            border-radius: 8px;
        }

        .modal-dialog {
            max-width: 50%;
        }
  </style>
</head>
<body>


                                          <div class="container mt-5">
                                            <div class="row justify-content-center">
                                               <div class="masonry-img-gallery" id="gallery"></div>
                                            </div>
                                        </div>

                                        <!-- Modal with Owl Carousel -->
                                        <div class="modal fade" id="imageModal" tabindex="-1">
                                            <div class="modal-dialog modal-dialog-centered modal-xl">
                                                <div class="modal-content bg-transparent border-0 position-relative">
                                                    <button type="button"
                                                        class="btn-close position-absolute top-0 end-0 m-3"
                                                        data-bs-dismiss="modal" aria-label="Close"></button>
                                                    <div class="modal-body p-0">
                                                 <div class="owl-carousel owl-theme" id="carouselGallery-post-page-launch-class-viii-revised-ict"></div>

                                                    </div>
                                                </div>
                                            </div>
                                        </div>

<!-- JS -->

    <!-- jquery cdn -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
        integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>

    <!--cdn owl  -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/OwlCarousel2/2.3.4/owl.carousel.min.js"
        integrity="sha512-bPs7Ae6pVvhOSiIcyUClR7/q2OAsRiovw4vAkX+zJbw3ShAeeqezq50RIIcIURq7Oa20rW2n2q+fyXBNcU9lrw=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>



    <!-- cdn JavaScript Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.10.2/dist/umd/popper.min.js"
        integrity="sha384-7+zCNj/IqJ95wo16oMtfsKbZ9ccEh31eOz1HGyDuCQ6wgnyJNSYdrPa03rtR1zdB"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.min.js"
        integrity="sha384-QJHtvGhmr9XOIpI6YVutG+2QOK9T+ZnN4kzFN1RtK3zEFEIsxhlmWl5/YESvpZ13"
        crossorigin="anonymous"></script>


    <!-- custom js -->



     <script>
          document.addEventListener("DOMContentLoaded", function () {
        const imageNames = [
            "CARES_Training_1.jpg",
            "CARES_Training_2.jpg",
            "CARES_Training_3.jpg",
            "CARES_Training_4.jpg",
            "CARES_Training_5.jpg",
            "CARES_Training_7.jpg",
            "CARES_Training_8.jpg",
            "CARES_Training_9.jpg",
            "CARES_Training_10.jpg"
        ];

        const basePath = "/images/cards-img/image-gallery- launch Class VIII Revised ICT Curriculum/";

        const gallery = document.getElementById("gallery");
        const carousel = document.getElementById("carouselGallery-post-page-launch-class-viii-revised-ict");

        imageNames.forEach((img, index) => {
            // Masonry gallery
            const masonryDiv = document.createElement("div");
            masonryDiv.className = "masonry-item-post";
            masonryDiv.dataset.index = index;
            masonryDiv.innerHTML = `<img src="${basePath}${img}" alt="img${index + 1}">`;
            gallery.appendChild(masonryDiv);

            // Carousel item
            const carouselDiv = document.createElement("div");
            carouselDiv.className = "item";
            carouselDiv.innerHTML = `<img src="${basePath}${img}" alt="">`;
            carousel.appendChild(carouselDiv);
        });

        // Owl carousel init
        const owl = $('#carouselGallery-post-page-launch-class-viii-revised-ict').owlCarousel({
            items: 1,
            loop: true,
            margin: 10,
            nav: true,
            dots: true,
            autoplay: true,
            navText: [
                "<i class='fa fa-caret-left'></i>",
                "<i class='fa fa-caret-right'></i>"
            ]
        });

        // Open modal
        gallery.querySelectorAll('.masonry-item-post').forEach((item, i) => {
            item.addEventListener('click', () => {
                $('#imageModal').modal('show');
                owl.trigger('to.owl.carousel', [i, 300]);
            });
        });
    });
        </script>

</body>
</html>
